services:
  - type: web
    name: documind-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this securely in the Render dashboard
    disk:
      name: vector-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: documind-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: documind-backend
          envVarKey: RENDER_EXTERNAL_URL
